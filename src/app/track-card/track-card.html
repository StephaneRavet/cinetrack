<!-- src/app/track-card/track-card.html -->
<article
  class="card"
  [class.active]="active()"
  [attr.aria-pressed]="active()"
  role="button"
  tabindex="0"
  (click)="selectTrack()"
  (keydown.enter)="selectTrack()"
  (keydown.space)="selectTrack()"
>
  <img [src]="track().coverUrl" [alt]="track().title" />
  <h3>{{ track().title }}</h3>
  <p>{{ track().artist }}</p>
  @if (active()) {
    <span class="badge">En lecture</span>
  }
</article>
